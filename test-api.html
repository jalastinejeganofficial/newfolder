<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Test - VeritasAI</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #7c3aed; }
    .test-section {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }
    button {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin: 10px 5px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { 
      padding: 10px; 
      border-radius: 5px; 
      margin: 10px 0;
      font-weight: 600;
    }
    .success { background: rgba(34,197,94,0.2); color: #22c55e; }
    .error { background: rgba(239,68,68,0.2); color: #ef4444; }
    .info { background: rgba(37,99,235,0.2); color: #3b82f6; }
    pre {
      background: #0f0f1a;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .model-list {
      list-style: none;
      padding: 0;
    }
    .model-list li {
      padding: 8px;
      margin: 5px 0;
      background: rgba(255,255,255,0.03);
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }
    .model-status { font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>🔍 VeritasAI - API Connection Test</h1>
  
  <div class="test-section">
    <h2>Configuration</h2>
    <div id="config-info"></div>
  </div>

  <div class="test-section">
    <h2>Available Free Models</h2>
    <ul class="model-list" id="modelList"></ul>
  </div>
  
  <div class="test-section">
    <h2>Test API Connection</h2>
    <button onclick="testConnection()">Test Primary Model</button>
    <button onclick="testAllModels()">Test All Fallbacks</button>
    <button onclick="runFullAnalysis()">Run Sample Analysis</button>
    <div id="test-status"></div>
  </div>

  <div class="test-section">
    <h2>Response Log</h2>
    <pre id="response-log">Click a test button to begin...</pre>
  </div>

  <script src="config.js"></script>
  <script>
    const log = document.getElementById('response-log');
    const statusDiv = document.getElementById('test-status');
    
    function appendLog(text, isError = false) {
      log.textContent += (isError ? '\n❌ ' : '\n✅ ') + text;
      log.scrollTop = log.scrollHeight;
    }

    // Display config
    document.getElementById('config-info').innerHTML = `
      <p><strong>API URL:</strong> ${CONFIG.API_URL}</p>
      <p><strong>Primary Model:</strong> ${CONFIG.MODEL}</p>
      <p><strong>Site URL:</strong> ${CONFIG.SITE_URL}</p>
    `;

    // Models to test
    const modelsToTest = [
      CONFIG.MODEL,
      "meta-llama/llama-3-8b-instruct",
      "meta-llama/llama-3.1-8b-instruct",
      "mistralai/mistral-7b-instruct"
    ];

    // Display model list
    document.getElementById('modelList').innerHTML = modelsToTest.map(model => `
      <li>
        <span>${model}</span>
        <span class="model-status" id="status-${model.replace(/[^a-z0-9]/g, '-')}">⏳ Not tested</span>
      </li>
    `).join('');

    async function testModel(model) {
      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${CONFIG.API_KEY}`,
            'HTTP-Referer': CONFIG.SITE_URL,
            'X-Title': CONFIG.SITE_NAME
          },
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'user', content: 'Say "OK" if you can read this.' }
            ],
            max_tokens: 10
          })
        });

        const statusEl = document.getElementById(`status-${model.replace(/[^a-z0-9]/g, '-')}`);
        
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.error?.message || `Status ${response.status}`);
        }

        const data = await response.json();
        if (statusEl) {
          statusEl.textContent = '✅ Working';
          statusEl.style.color = '#22c55e';
        }
        return true;
      } catch (error) {
        const statusEl = document.getElementById(`status-${model.replace(/[^a-z0-9]/g, '-')}`);
        if (statusEl) {
          statusEl.textContent = `❌ ${error.message}`;
          statusEl.style.color = '#ef4444';
        }
        return false;
      }
    }

    async function testConnection() {
      log.textContent = `Testing primary model: ${CONFIG.MODEL}...\n`;
      statusDiv.innerHTML = '<div class="info">Testing...</div>';
      
      const success = await testModel(CONFIG.MODEL);
      
      if (success) {
        statusDiv.innerHTML = '<div class="success">✅ Primary model is working!</div>';
        appendLog('Connection successful!');
      } else {
        statusDiv.innerHTML = '<div class="error">❌ Primary model failed. Try "Test All Fallbacks"</div>';
        appendLog('Connection failed!', true);
      }
    }

    async function testAllModels() {
      log.textContent = 'Testing all models in fallback chain...\n';
      statusDiv.innerHTML = '<div class="info">Testing all models...</div>';
      
      let successCount = 0;
      for (const model of modelsToTest) {
        appendLog(`Testing ${model}...`);
        const success = await testModel(model);
        if (success) successCount++;
        await new Promise(r => setTimeout(r, 500)); // Rate limit protection
      }
      
      statusDiv.innerHTML = `<div class="${successCount > 0 ? 'success' : 'error'}">
        ${successCount}/${modelsToTest.length} models working
      </div>`;
      appendLog(`Test complete: ${successCount}/${modelsToTest.length} models available`);
    }

    async function runFullAnalysis() {
      log.textContent = 'Running sample analysis...\n';
      statusDiv.innerHTML = '<div class="info">Analyzing sample claim...</div>';
      
      const testText = "The moon landing was faked in 1969.";
      
      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${CONFIG.API_KEY}`,
            'HTTP-Referer': CONFIG.SITE_URL,
            'X-Title': CONFIG.SITE_NAME
          },
          body: JSON.stringify({
            model: CONFIG.MODEL,
            messages: [
              { role: 'system', content: CONFIG.SYSTEM_PROMPT },
              { role: 'user', content: `Analyze this text:\n\n${testText}` }
            ],
            temperature: 0.3,
            max_tokens: 2000
          })
        });

        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }

        const data = await response.json();
        const content = data.choices[0].message.content;
        
        appendLog('Raw API Response:');
        log.textContent += '\n' + '='.repeat(50) + '\n';
        
        try {
          const parsed = JSON.parse(content);
          appendLog('✅ Successfully parsed JSON response!');
          appendLog(`Found ${parsed.claims?.length || 0} claims`);
          appendLog(`Overall credibility: ${parsed.overall_credibility || 'N/A'}%`);
          
          log.textContent += '\n\nParsed Summary:\n';
          log.textContent += JSON.stringify(parsed, null, 2);
          
          statusDiv.innerHTML = '<div class="success">✅ Full analysis successful! Check main app.</div>';
        } catch (parseError) {
          appendLog('❌ Failed to parse JSON:', true);
          log.textContent += '\n\nRaw content:\n' + content;
          statusDiv.innerHTML = '<div class="error">❌ Parse error. Check logs.</div>';
        }
      } catch (error) {
        appendLog(`Error: ${error.message}`, true);
        statusDiv.innerHTML = '<div class="error">❌ Analysis failed</div>';
      }
    }
  </script>
</body>
</html>
