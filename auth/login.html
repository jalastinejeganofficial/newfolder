<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register - VeritasAI</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      padding: 100px 20px 60px;
      background: linear-gradient(135deg, #020208 0%, #060612 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      background: rgba(10, 12, 40, 0.6);
      backdrop-filter: blur(40px);
      border: 2px solid rgba(79, 70, 229, 0.3);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-logo {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .auth-title {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #a5b4fc, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .auth-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 12px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .auth-tab.active {
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      color: white;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 12, 40, 0.8);
      border: 2px solid rgba(79, 70, 229, 0.3);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .form-input:focus {
      border-color: rgba(79, 70, 229, 0.6);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .auth-divider {
      margin: 32px 0;
      text-align: center;
      position: relative;
    }

    .auth-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(79, 70, 229, 0.3);
    }

    .auth-divider span {
      background: rgba(10, 12, 40, 0.6);
      padding: 0 16px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    .alert {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      display: none;
    }

    .alert.error {
      background: rgba(239, 68, 68, 0.15);
      border: 2px solid rgba(239, 68, 68, 0.4);
      color: #ef4444;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.15);
      border: 2px solid rgba(16, 185, 129, 0.4);
      color: #10b981;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 24px;
      transition: all 0.3s;
    }

    .back-link:hover {
      color: #0ea5e9;
      transform: translateX(-4px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .auth-page {
        padding: 80px 16px 40px;
      }

      .auth-container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">
        <img src="../ai-hero.png" alt="VeritasAI logo" />
      </div>
      <div>
        <div class="nav-logo-text"><span>Neural </span>Syndicates</div>
      </div>
    </div>
    <div class="nav-badge">HACKATHON DEMO</div>
    <div class="nav-links">
      <a href="../index.html#analyze">Analyze</a>
      <a href="../how-it-works.html">How It Works</a>
      <a href="../verdicts.html">Verdicts</a>
      <a href="community.html">Community</a>
      <select id="languageSelector" class="language-selector" onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="ta">தமிழ்</option>
        <option value="hi">हिन्दी</option>
        <option value="te">తెలుగు</option>
        <option value="ja">日本語</option>
      </select>
    </div>
  </nav>

  <!-- Auth Content -->
  <div class="auth-page">
    <div class="auth-container">
      
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">🔐</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Join the VeritasAI community</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alerts -->
      <div id="errorAlert" class="alert error"></div>
      <div id="successAlert" class="alert success"></div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginUsername">Username</label>
          <input 
            type="text" 
            id="loginUsername" 
            class="form-input" 
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input 
            type="password" 
            id="loginPassword" 
            class="form-input" 
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Login
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <input 
            type="text" 
            id="regUsername" 
            class="form-input" 
            placeholder="Choose a username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input 
            type="email" 
            id="regEmail" 
            class="form-input" 
            placeholder="your.email@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="regFullName">Full Name (Optional)</label>
          <input 
            type="text" 
            id="regFullName" 
            class="form-input" 
            placeholder="John Doe"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <input 
            type="password" 
            id="regPassword" 
            class="form-input" 
            placeholder="Create a strong password"
            minlength="6"
            required
          />
        </div>

        <button type="submit" class="btn-primary" id="registerBtn">
          Create Account
        </button>
      </form>

      <!-- Back Link -->
      <a href="../index.html" class="back-link">
        ← Back to Home
      </a>

    </div>
  </div>

  <script src="../i18n.js"></script>
  <script src="../storage.js"></script>
  <script>
    const API_BASE_URL = 'http://localhost:8000/api';

    // Switch between login and register tabs
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
      
      hideAlerts();
    }

    // Show alert
    function showAlert(type, message) {
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');
      
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      
      if (type === 'error') {
        errorAlert.textContent = message;
        errorAlert.style.display = 'block';
      } else {
        successAlert.textContent = message;
        successAlert.style.display = 'block';
      }
    }

    // Hide alerts
    function hideAlerts() {
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('successAlert').style.display = 'none';
    }

    // Handle login
    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const loginBtn = document.getElementById('loginBtn');
      
      try {
        // Disable button
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';
        
        // Call API
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'Login failed');
        }
        
        console.log('=== LOGIN SUCCESS ===');
        console.log('Access token:', data.access_token);
        console.log('User data:', data.user);
        
        // Save token and user info
        localStorage.setItem('veritasai_token', data.access_token);
        localStorage.setItem('veritasai_user', JSON.stringify(data.user));
        
        // Verify it was saved
        const savedToken = localStorage.getItem('veritasai_token');
        const savedUser = localStorage.getItem('veritasai_user');
        console.log('Saved token:', savedToken);
        console.log('Saved user:', savedUser);
        console.log('=====================');
        
        // Show success
        showAlert('success', 'Login successful! Redirecting...');
        
        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'community.html';
        }, 1500);
        
      } catch (error) {
        console.error('Login error:', error);
        showAlert('error', error.message || 'Login failed. Please check your credentials.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    // Handle register
    async function handleRegister(event) {
      event.preventDefault();
      
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const fullName = document.getElementById('regFullName').value;
      const password = document.getElementById('regPassword').value;
      const registerBtn = document.getElementById('registerBtn');
      
      try {
        // Disable button
        registerBtn.disabled = true;
        registerBtn.textContent = 'Creating account...';
        
        // Call API
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, full_name: fullName, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'Registration failed');
        }
        
        // Show success
        showAlert('success', 'Account created successfully! Redirecting to login...');
        
        // Clear form
        document.getElementById('registerForm').reset();
        
        // Switch to login after delay
        setTimeout(() => {
          switchTab('login');
        }, 2000);
        
      } catch (error) {
        console.error('Registration error:', error);
        showAlert('error', error.message || 'Registration failed. Username or email may already exist.');
      } finally {
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      }
    }

    // Check if already logged in
    function checkAuth() {
      const token = localStorage.getItem('veritasai_token');
      if (token) {
        // User is already logged in, redirect to community
        window.location.href = 'community.html';
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      
      // Initialize language
      const savedLang = localStorage.getItem('veritasai_language') || 'en';
      document.getElementById('languageSelector').value = savedLang;
      I18N.init();
      I18N.setLanguage(savedLang);
    });
  </script>
</body>
</html>
